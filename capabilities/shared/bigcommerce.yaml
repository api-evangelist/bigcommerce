name: BigCommerce APIs
description: Shared capability definitions for the BigCommerce e-commerce platform APIs
version: v3
baseUrl: https://api.bigcommerce.com/stores/{store_hash}/v3

authentication:
  type: apiKey
  header: X-Auth-Token
  value: "{{BIGCOMMERCE_API_TOKEN}}"

operations:
  # Catalog - Products
  - operationId: getProducts
    name: list-products
    summary: List all products in the BigCommerce catalog
    method: GET
    path: /catalog/products
    tags:
      - Catalog
  - operationId: getProductById
    name: get-product
    summary: Get a single product by ID
    method: GET
    path: /catalog/products/{product_id}
    tags:
      - Catalog
  - operationId: createProduct
    name: create-product
    summary: Create a new product in the catalog
    method: POST
    path: /catalog/products
    tags:
      - Catalog
  - operationId: updateProduct
    name: update-product
    summary: Update an existing product
    method: PUT
    path: /catalog/products/{product_id}
    tags:
      - Catalog
  - operationId: deleteProduct
    name: delete-product
    summary: Delete a product from the catalog
    method: DELETE
    path: /catalog/products/{product_id}
    tags:
      - Catalog
  # Catalog - Categories
  - operationId: getCategories
    name: list-categories
    summary: List all product categories
    method: GET
    path: /catalog/categories
    tags:
      - Catalog
  - operationId: createCategory
    name: create-category
    summary: Create a new product category
    method: POST
    path: /catalog/categories
    tags:
      - Catalog
  # Orders
  - operationId: listOrders
    name: list-orders
    summary: List all store orders
    method: GET
    path: /orders
    tags:
      - Orders
    baseUrl: https://api.bigcommerce.com/stores/{store_hash}/v2
  - operationId: getOrder
    name: get-order
    summary: Get a specific order by ID
    method: GET
    path: /orders/{order_id}
    tags:
      - Orders
    baseUrl: https://api.bigcommerce.com/stores/{store_hash}/v2
  # Customers
  - operationId: getCustomers
    name: list-customers
    summary: List all store customers
    method: GET
    path: /customers
    tags:
      - Customers
  - operationId: createCustomer
    name: create-customer
    summary: Create a new customer account
    method: POST
    path: /customers
    tags:
      - Customers

expose:
  rest:
    port: 8100
  mcp:
    port: 9100
