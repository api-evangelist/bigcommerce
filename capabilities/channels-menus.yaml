    resources:
    - name: channels-channel_id-channel-menus
      path: /channels/{channel_id}/channel-menus
      operations:
      - name: getchannelmenus
        method: GET
        description: BigCommerce Get Channel Menus
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createchannelmenus
