      description: REST surface for banners-id.
      operations:
      - method: GET
        name: getbanner
        description: BigCommerce Get a Banner
        call: marketing-banners.getbanner
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatebanner
