    description: BigCommerce Marketing — Banners business capability. Self-contained, no shared references.
    resources:
    - name: banners
      path: /banners
      operations:
      - name: getbanners
        method: GET
        description: BigCommerce Get All Banners
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: min_id
          in: query
          type: integer
          description: Optional filter param `/api/v2/banners?min_id={value}`
        - name: max_id
          in: query
          type: integer
          description: Optional filter param `/api/v2/banners?max_id={value}`
        - name: page
          in: query
          type: number
          description: Optional filter param `/api/v2/banners?page={number}`
        - name: limit
          in: query
          type: number
          description: Optional filter param `/api/v2/banners?limit={count}`
      - name: createbanner
        method: POST
        description: BigCommerce Create a Banner
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletebanners
        method: DELETE
        description: BigCommerce Delete All Banners
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: banners-count
      path: /banners/count
      operations:
      - name: getbannerscount
        method: GET
        description: BigCommerce Get a Count of Store Banners
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: banners-id
      path: /banners/{id}
      operations:
      - name: getbanner
        method: GET
        description: BigCommerce Get a Banner
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatebanner
        method: PUT
        description: BigCommerce Update a Banner
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletebanner
        method: DELETE
        description: BigCommerce Delete a Banner
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.BIGCOMMERCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: marketing-banners-rest
    port: 8080
    description: REST adapter for BigCommerce Marketing — Banners. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/banners
      name: banners
      description: REST surface for banners.
      operations:
      - method: GET
        name: getbanners
        description: BigCommerce Get All Banners
        call: marketing-banners.getbanners
        with:
          min_id: rest.min_id
          max_id: rest.max_id
          page: rest.page
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createbanner
        description: BigCommerce Create a Banner
        call: marketing-banners.createbanner
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
