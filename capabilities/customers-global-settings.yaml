naftiko: 1.0.0-alpha2
info:
  label: BigCommerce Customers V3 — Global Settings
  description: 'BigCommerce Customers V3 — Global Settings. 2 operations. Lead operation: BigCommerce Get Customer Settings.
    Self-contained Naftiko capability covering one Bigcommerce business surface.'
  tags:
  - Bigcommerce
  - Global Settings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BIGCOMMERCE_API_KEY: BIGCOMMERCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: customers-global-settings
    baseUri: https://api.bigcommerce.com/stores/{store_hash}/v3
    description: BigCommerce Customers V3 — Global Settings business capability. Self-contained, no shared references.
    resources:
    - name: customers-settings
      path: /customers/settings
      operations:
      - name: getcustomerssettings
        method: GET
        description: BigCommerce Get Customer Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatecustomerssettings
        method: PUT
        description: BigCommerce Update Customer Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.BIGCOMMERCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: customers-global-settings-rest
    port: 8080
    description: REST adapter for BigCommerce Customers V3 — Global Settings. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/customers/settings
      name: customers-settings
      description: REST surface for customers-settings.
      operations:
      - method: GET
        name: getcustomerssettings
        description: BigCommerce Get Customer Settings
        call: customers-global-settings.getcustomerssettings
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatecustomerssettings
        description: BigCommerce Update Customer Settings
        call: customers-global-settings.updatecustomerssettings
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: customers-global-settings-mcp
    port: 9090
    transport: http
    description: MCP adapter for BigCommerce Customers V3 — Global Settings. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: bigcommerce-get-customer-settings
      description: BigCommerce Get Customer Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: customers-global-settings.getcustomerssettings
      outputParameters:
      - type: object
        mapping: $.
    - name: bigcommerce-update-customer-settings
      description: BigCommerce Update Customer Settings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: customers-global-settings.updatecustomerssettings
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
