naftiko: 1.0.0-alpha2
info:
  label: BigCommerce Checkouts — Checkout Orders
  description: 'BigCommerce Checkouts — Checkout Orders. 1 operations. Lead operation: BigCommerce Create an Order. Self-contained
    Naftiko capability covering one Bigcommerce business surface.'
  tags:
  - Bigcommerce
  - Checkout Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BIGCOMMERCE_API_KEY: BIGCOMMERCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: checkouts-checkout-orders
    baseUri: https://api.bigcommerce.com/stores/{store_hash}/v3
    description: BigCommerce Checkouts — Checkout Orders business capability. Self-contained, no shared references.
    resources:
    - name: checkouts-checkoutId-orders
      path: /checkouts/{checkoutId}/orders
      operations:
      - name: createorder
        method: POST
        description: BigCommerce Create an Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.BIGCOMMERCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: checkouts-checkout-orders-rest
    port: 8080
    description: REST adapter for BigCommerce Checkouts — Checkout Orders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/checkouts/{checkoutid}/orders
      name: checkouts-checkoutid-orders
      description: REST surface for checkouts-checkoutId-orders.
      operations:
      - method: POST
        name: createorder
        description: BigCommerce Create an Order
        call: checkouts-checkout-orders.createorder
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: checkouts-checkout-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for BigCommerce Checkouts — Checkout Orders. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: bigcommerce-create-order
      description: BigCommerce Create an Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkouts-checkout-orders.createorder
      outputParameters:
      - type: object
        mapping: $.
