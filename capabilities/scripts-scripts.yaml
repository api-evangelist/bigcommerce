naftiko: 1.0.0-alpha2
info:
  label: BigCommerce Scripts — Scripts
  description: 'BigCommerce Scripts — Scripts. 5 operations. Lead operation: BigCommerce Create a Script. Self-contained Naftiko
    capability covering one Bigcommerce business surface.'
  tags:
  - Bigcommerce
  - Scripts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BIGCOMMERCE_API_KEY: BIGCOMMERCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: scripts-scripts
    baseUri: https://api.bigcommerce.com/stores/{store_hash}/v3
    description: BigCommerce Scripts — Scripts business capability. Self-contained, no shared references.
    resources:
    - name: content-scripts
      path: /content/scripts
      operations:
      - name: createscript
        method: POST
        description: BigCommerce Create a Script
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: getscripts
        method: GET
        description: BigCommerce Get All Scripts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Specifies the page number in a limited (paginated) list of products.
        - name: limit
          in: query
          type: integer
          description: Controls the number of items per page in a limited (paginated) list of products.
        - name: sort
          in: query
          type: string
          description: 'Field name to sort the scripts by. Note: Since `id` increments when new scripts are added, you can
            use that field to sort by script create date.'
        - name: direction
          in: query
          type: string
          description: 'Sort direction. Acceptable values are: `asc`, `desc`.'
        - name: channel_id:in
          in: query
          type: array
          description: Filters list of scripts by the associated channel_id.
    - name: content-scripts-uuid
      path: /content/scripts/{uuid}
      operations:
      - name: getscript
        method: GET
        description: BigCommerce Get a Script
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatescript
        method: PUT
        description: BigCommerce Update a Script
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletescript
        method: DELETE
        description: BigCommerce Delete a Script
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.BIGCOMMERCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: scripts-scripts-rest
    port: 8080
    description: REST adapter for BigCommerce Scripts — Scripts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/content/scripts
      name: content-scripts
      description: REST surface for content-scripts.
      operations:
      - method: POST
        name: createscript
        description: BigCommerce Create a Script
        call: scripts-scripts.createscript
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getscripts
        description: BigCommerce Get All Scripts
        call: scripts-scripts.getscripts
        with:
          page: rest.page
          limit: rest.limit
          sort: rest.sort
          direction: rest.direction
          channel_id:in: rest.channel_id:in
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/content/scripts/{uuid}
      name: content-scripts-uuid
      description: REST surface for content-scripts-uuid.
      operations:
      - method: GET
        name: getscript
        description: BigCommerce Get a Script
        call: scripts-scripts.getscript
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatescript
        description: BigCommerce Update a Script
        call: scripts-scripts.updatescript
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletescript
        description: BigCommerce Delete a Script
        call: scripts-scripts.deletescript
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: scripts-scripts-mcp
    port: 9090
    transport: http
    description: MCP adapter for BigCommerce Scripts — Scripts. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: bigcommerce-create-script
      description: BigCommerce Create a Script
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: scripts-scripts.createscript
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: bigcommerce-get-all-scripts
      description: BigCommerce Get All Scripts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: scripts-scripts.getscripts
      with:
        page: tools.page
        limit: tools.limit
        sort: tools.sort
        direction: tools.direction
        channel_id:in: tools.channel_id:in
      outputParameters:
      - type: object
        mapping: $.
    - name: bigcommerce-get-script
      description: BigCommerce Get a Script
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: scripts-scripts.getscript
      outputParameters:
      - type: object
        mapping: $.
    - name: bigcommerce-update-script
      description: BigCommerce Update a Script
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: scripts-scripts.updatescript
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: bigcommerce-delete-script
      description: BigCommerce Delete a Script
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: scripts-scripts.deletescript
      outputParameters:
      - type: object
        mapping: $.
