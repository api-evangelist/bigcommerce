naftiko: 1.0.0-alpha2
info:
  label: BigCommerce Settings V3 — Logo Image
  description: 'BigCommerce Settings V3 — Logo Image. 1 operations. Lead operation: BigCommerce Create Logo Image. Self-contained
    Naftiko capability covering one Bigcommerce business surface.'
  tags:
  - Bigcommerce
  - Logo Image
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BIGCOMMERCE_API_KEY: BIGCOMMERCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: settings-logo-image
    baseUri: https://api.bigcommerce.com/stores/{store_hash}/v3
    description: BigCommerce Settings V3 — Logo Image business capability. Self-contained, no shared references.
    resources:
    - name: settings-logo-image
      path: /settings/logo/image
      operations:
      - name: createsettingslogoimage
        method: POST
        description: BigCommerce Create Logo Image
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.BIGCOMMERCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: settings-logo-image-rest
    port: 8080
    description: REST adapter for BigCommerce Settings V3 — Logo Image. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/settings/logo/image
      name: settings-logo-image
      description: REST surface for settings-logo-image.
      operations:
      - method: POST
        name: createsettingslogoimage
        description: BigCommerce Create Logo Image
        call: settings-logo-image.createsettingslogoimage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: settings-logo-image-mcp
    port: 9090
    transport: http
    description: MCP adapter for BigCommerce Settings V3 — Logo Image. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: bigcommerce-create-logo-image
      description: BigCommerce Create Logo Image
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: settings-logo-image.createsettingslogoimage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
