      description: REST surface for checkouts-checkoutId-discounts.
      operations:
      - method: POST
        name: addcheckoutdiscount
        description: BigCommerce Add Discount to Checkout
        call: checkouts-checkout-discounts.addcheckoutdiscount
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
