      description: BigCommerce Add Discount to Checkout
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: checkouts-checkout-discounts.addcheckoutdiscount
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
