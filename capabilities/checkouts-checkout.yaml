naftiko: 1.0.0-alpha2
info:
  label: BigCommerce Checkouts — Checkout
  description: 'BigCommerce Checkouts — Checkout. 2 operations. Lead operation: BigCommerce Get a Checkout. Self-contained
    Naftiko capability covering one Bigcommerce business surface.'
  tags:
  - Bigcommerce
  - Checkout
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BIGCOMMERCE_API_KEY: BIGCOMMERCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: checkouts-checkout
    baseUri: https://api.bigcommerce.com/stores/{store_hash}/v3
    description: BigCommerce Checkouts — Checkout business capability. Self-contained, no shared references.
    resources:
    - name: checkouts-checkoutId
      path: /checkouts/{checkoutId}
      operations:
      - name: getcheckout
        method: GET
        description: BigCommerce Get a Checkout
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: include
          in: query
          type: string
          description: '* `cart.line_items.physical_items.options` - physical options'
      - name: updatecheckout
        method: PUT
        description: BigCommerce Update Customer Messages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.BIGCOMMERCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: checkouts-checkout-rest
    port: 8080
    description: REST adapter for BigCommerce Checkouts — Checkout. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/checkouts/{checkoutid}
      name: checkouts-checkoutid
      description: REST surface for checkouts-checkoutId.
      operations:
      - method: GET
        name: getcheckout
        description: BigCommerce Get a Checkout
        call: checkouts-checkout.getcheckout
        with:
          include: rest.include
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatecheckout
        description: BigCommerce Update Customer Messages
        call: checkouts-checkout.updatecheckout
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: checkouts-checkout-mcp
    port: 9090
    transport: http
    description: MCP adapter for BigCommerce Checkouts — Checkout. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: bigcommerce-get-checkout
      description: BigCommerce Get a Checkout
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: checkouts-checkout.getcheckout
      with:
        include: tools.include
      outputParameters:
      - type: object
        mapping: $.
    - name: bigcommerce-update-customer-messages
      description: BigCommerce Update Customer Messages
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: checkouts-checkout.updatecheckout
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
