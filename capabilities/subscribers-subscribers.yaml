        description: BigCommerce Get a Subscriber
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: subscriber_id
          in: path
          type: integer
          description: The ID of the `Subscriber` requested.
          required: true
      - name: updatesubscriber
        method: PUT
        description: BigCommerce Update a Subscriber
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
