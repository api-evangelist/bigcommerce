naftiko: 1.0.0-alpha2
info:
  label: BigCommerce Payment Access Token — Access
  description: 'BigCommerce Payment Access Token — Access. 1 operations. Lead operation: BigCommerce Create Payment Access
    Token. Self-contained Naftiko capability covering one Bigcommerce business surface.'
  tags:
  - Bigcommerce
  - Access
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BIGCOMMERCE_API_KEY: BIGCOMMERCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: payment-access-token-access
    baseUri: https://api.bigcommerce.com/stores/{store_hash}/v3
    description: BigCommerce Payment Access Token — Access business capability. Self-contained, no shared references.
    resources:
    - name: payments-access_tokens
      path: /payments/access_tokens
      operations:
      - name: createpaymentaccesstoken
        method: POST
        description: BigCommerce Create Payment Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.BIGCOMMERCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: payment-access-token-access-rest
    port: 8080
    description: REST adapter for BigCommerce Payment Access Token — Access. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/payments/access-tokens
      name: payments-access-tokens
      description: REST surface for payments-access_tokens.
      operations:
      - method: POST
        name: createpaymentaccesstoken
        description: BigCommerce Create Payment Access Token
        call: payment-access-token-access.createpaymentaccesstoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payment-access-token-access-mcp
    port: 9090
    transport: http
    description: MCP adapter for BigCommerce Payment Access Token — Access. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: bigcommerce-create-payment-access-token
      description: BigCommerce Create Payment Access Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: payment-access-token-access.createpaymentaccesstoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
