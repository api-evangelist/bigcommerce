naftiko: 1.0.0-alpha2
info:
  label: BigCommerce Settings V3 — Inventory
  description: 'BigCommerce Settings V3 — Inventory. 2 operations. Lead operation: BigCommerce Get Inventory Settings. Self-contained
    Naftiko capability covering one Bigcommerce business surface.'
  tags:
  - Bigcommerce
  - Inventory
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BIGCOMMERCE_API_KEY: BIGCOMMERCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: settings-inventory
    baseUri: https://api.bigcommerce.com/stores/{store_hash}/v3
    description: BigCommerce Settings V3 — Inventory business capability. Self-contained, no shared references.
    resources:
    - name: settings-inventory
      path: /settings/inventory
      operations:
      - name: getsettingsinventory
        method: GET
        description: BigCommerce Get Inventory Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesettingsinventory
        method: PUT
        description: BigCommerce Update Inventory Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.BIGCOMMERCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: settings-inventory-rest
    port: 8080
    description: REST adapter for BigCommerce Settings V3 — Inventory. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/settings/inventory
      name: settings-inventory
      description: REST surface for settings-inventory.
      operations:
      - method: GET
        name: getsettingsinventory
        description: BigCommerce Get Inventory Settings
        call: settings-inventory.getsettingsinventory
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesettingsinventory
        description: BigCommerce Update Inventory Settings
        call: settings-inventory.updatesettingsinventory
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: settings-inventory-mcp
    port: 9090
    transport: http
    description: MCP adapter for BigCommerce Settings V3 — Inventory. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: bigcommerce-get-inventory-settings
      description: BigCommerce Get Inventory Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: settings-inventory.getsettingsinventory
      outputParameters:
      - type: object
        mapping: $.
    - name: bigcommerce-update-inventory-settings
      description: BigCommerce Update Inventory Settings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: settings-inventory.updatesettingsinventory
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
