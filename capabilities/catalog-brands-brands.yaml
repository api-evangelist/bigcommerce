    resources:
    - name: catalog-brands
      path: /catalog/brands
      operations:
      - name: getbrands
        method: GET
        description: BigCommerce Get All Brands
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: integer
          description: Filter items by ID.
        - name: id:in
          in: query
          type: array
        - name: id:not_in
          in: query
          type: array
        - name: name
          in: query
          type: string
          description: Filter items by name.
        - name: name:like
          in: query
          type: string
          description: Filter items by part of a name. For example, `name:like=new` returns brands with names that include
            `new`.
        - name: page_title
          in: query
          type: string
          description: Filter items by page_title.
        - name: page
          in: query
          type: integer
          description: Specifies the page number in a limited (paginated) list of products.
        - name: limit
          in: query
          type: integer
          description: Controls the number of items per page in a limited (paginated) list of products.
        - name: include_fields
          in: query
          type: string
          description: Fields to include, in a comma-separated list. The ID and the specified fields will be returned.
        - name: exclude_fields
          in: query
          type: string
          description: Fields to exclude, in a comma-separated list. The specified fields will be excluded from a response.
            The ID cannot be excluded.
        - name: sort
          in: query
          type: string
          description: Field name to sort by.
      - name: createbrand
        method: POST
        description: BigCommerce Create a Brand
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletebrands
        method: DELETE
        description: BigCommerce Delete Brands
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Filter items by name.
          required: true
        - name: page_title
          in: query
          type: string
          description: Filter items by page_title.
    - name: catalog-brands-brand_id
      path: /catalog/brands/{brand_id}
      operations:
      - name: getbrand
        method: GET
        description: BigCommerce Get a Brand
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: include_fields
          in: query
          type: string
          description: Fields to include, in a comma-separated list. The ID and the specified fields will be returned.
        - name: exclude_fields
          in: query
