            The ID cannot be excluded.
      - name: updatebrand
        method: PUT
        description: BigCommerce Update a Brand
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletebrand
        method: DELETE
        description: BigCommerce Delete a Brand
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
