naftiko: 1.0.0-alpha2
info:
  label: BigCommerce Abandoned Carts — Abandoned Carts
  description: 'BigCommerce Abandoned Carts — Abandoned Carts. 1 operations. Lead operation: BigCommerce Get an Abandoned
    Cart. Self-contained Naftiko capability covering one Bigcommerce business surface.'
  tags:
  - Bigcommerce
  - Abandoned Carts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BIGCOMMERCE_API_KEY: BIGCOMMERCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: abandoned-carts-abandoned-carts
    baseUri: https://api.bigcommerce.com/stores/{store_hash}/v3
    description: BigCommerce Abandoned Carts — Abandoned Carts business capability. Self-contained, no shared references.
    resources:
    - name: abandoned-carts-token
      path: /abandoned-carts/{token}
      operations:
      - name: getabandonedcarts
        method: GET
        description: BigCommerce Get an Abandoned Cart
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.BIGCOMMERCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: abandoned-carts-abandoned-carts-rest
    port: 8080
    description: REST adapter for BigCommerce Abandoned Carts — Abandoned Carts. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/abandoned-carts/{token}
      name: abandoned-carts-token
      description: REST surface for abandoned-carts-token.
      operations:
      - method: GET
        name: getabandonedcarts
        description: BigCommerce Get an Abandoned Cart
        call: abandoned-carts-abandoned-carts.getabandonedcarts
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: abandoned-carts-abandoned-carts-mcp
    port: 9090
    transport: http
    description: MCP adapter for BigCommerce Abandoned Carts — Abandoned Carts. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: bigcommerce-get-abandoned-cart
      description: BigCommerce Get an Abandoned Cart
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: abandoned-carts-abandoned-carts.getabandonedcarts
      outputParameters:
      - type: object
        mapping: $.
