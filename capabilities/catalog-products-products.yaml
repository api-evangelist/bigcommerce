        - name: out_of_stock
          in: query
          type: integer
          description: Filter items by out_of_stock. To enable the filter, pass `out_of_stock`=`1`.
        - name: total_sold
          in: query
          type: integer
          description: Filter items by total_sold.
        - name: type
          in: query
          type: string
          description: Filter items by type.
        - name: categories
          in: query
