          in: query
          type: string
        - name: category_uuid:not_in
          in: query
          type: string
        - name: category_id:in
          in: query
          type: string
        - name: category_id:not_in
          in: query
          type: string
        - name: tree_id:in
          in: query
          type: string
        - name: tree_id:not_in
          in: query
          type: string
        - name: parent_id:in
          in: query
          type: string
        - name: parent_id:not_in
          in: query
          type: string
        - name: name
          in: query
          type: string
        - name: name:like
          in: query
          type: string
        - name: page_title
          in: query
          type: string
        - name: page_title:like
          in: query
          type: string
        - name: keyword
          in: query
          type: string
        - name: is_visible
          in: query
          type: boolean
        - name: page
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: include_fields
          in: query
          type: string
        - name: exclude_fields
          in: query
          type: string
      - name: createcategories
        method: POST
        description: BigCommerce Create Categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: updatecategories
        method: PUT
        description: BigCommerce Update Categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
