naftiko: 1.0.0-alpha2
info:
  label: BigCommerce Settings V3 — Units of Measurement
  description: 'BigCommerce Settings V3 — Units of Measurement. 2 operations. Lead operation: BigCommerce Get Units of Measurement
    Settings. Self-contained Naftiko capability covering one Bigcommerce business surface.'
  tags:
  - Bigcommerce
  - Units of Measurement
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BIGCOMMERCE_API_KEY: BIGCOMMERCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: settings-units-of-measurement
    baseUri: https://api.bigcommerce.com/stores/{store_hash}/v3
    description: BigCommerce Settings V3 — Units of Measurement business capability. Self-contained, no shared references.
    resources:
    - name: settings-store-units-of-measurement
      path: /settings/store/units-of-measurement
      operations:
      - name: getsettingsmeasurementunits
        method: GET
        description: BigCommerce Get Units of Measurement Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesettingsmeasurementunits
        method: PUT
        description: BigCommerce Update Units of Measurement Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.BIGCOMMERCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: settings-units-of-measurement-rest
    port: 8080
    description: REST adapter for BigCommerce Settings V3 — Units of Measurement. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/settings/store/units-of-measurement
      name: settings-store-units-of-measurement
      description: REST surface for settings-store-units-of-measurement.
      operations:
      - method: GET
        name: getsettingsmeasurementunits
        description: BigCommerce Get Units of Measurement Settings
        call: settings-units-of-measurement.getsettingsmeasurementunits
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesettingsmeasurementunits
        description: BigCommerce Update Units of Measurement Settings
        call: settings-units-of-measurement.updatesettingsmeasurementunits
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: settings-units-of-measurement-mcp
    port: 9090
    transport: http
    description: MCP adapter for BigCommerce Settings V3 — Units of Measurement. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: bigcommerce-get-units-measurement-settings
      description: BigCommerce Get Units of Measurement Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: settings-units-of-measurement.getsettingsmeasurementunits
      outputParameters:
      - type: object
        mapping: $.
    - name: bigcommerce-update-units-measurement-settings
      description: BigCommerce Update Units of Measurement Settings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: settings-units-of-measurement.updatesettingsmeasurementunits
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
