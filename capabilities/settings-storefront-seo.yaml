naftiko: 1.0.0-alpha2
info:
  label: BigCommerce Settings V3 — Storefront SEO
  description: 'BigCommerce Settings V3 — Storefront SEO. 2 operations. Lead operation: BigCommerce Get Storefront SEO Settings.
    Self-contained Naftiko capability covering one Bigcommerce business surface.'
  tags:
  - Bigcommerce
  - Storefront SEO
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BIGCOMMERCE_API_KEY: BIGCOMMERCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: settings-storefront-seo
    baseUri: https://api.bigcommerce.com/stores/{store_hash}/v3
    description: BigCommerce Settings V3 — Storefront SEO business capability. Self-contained, no shared references.
    resources:
    - name: settings-storefront-seo
      path: /settings/storefront/seo
      operations:
      - name: getsettingsstorefrontseo
        method: GET
        description: BigCommerce Get Storefront SEO Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesettingsstorefrontseo
        method: PUT
        description: BigCommerce Update Storefront SEO Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.BIGCOMMERCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: settings-storefront-seo-rest
    port: 8080
    description: REST adapter for BigCommerce Settings V3 — Storefront SEO. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/settings/storefront/seo
      name: settings-storefront-seo
      description: REST surface for settings-storefront-seo.
      operations:
      - method: GET
        name: getsettingsstorefrontseo
        description: BigCommerce Get Storefront SEO Settings
        call: settings-storefront-seo.getsettingsstorefrontseo
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesettingsstorefrontseo
        description: BigCommerce Update Storefront SEO Settings
        call: settings-storefront-seo.updatesettingsstorefrontseo
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: settings-storefront-seo-mcp
    port: 9090
    transport: http
    description: MCP adapter for BigCommerce Settings V3 — Storefront SEO. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: bigcommerce-get-storefront-seo-settings
      description: BigCommerce Get Storefront SEO Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: settings-storefront-seo.getsettingsstorefrontseo
      outputParameters:
      - type: object
        mapping: $.
    - name: bigcommerce-update-storefront-seo-settings
      description: BigCommerce Update Storefront SEO Settings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: settings-storefront-seo.updatesettingsstorefrontseo
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
