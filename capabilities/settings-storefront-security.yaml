naftiko: 1.0.0-alpha2
info:
  label: BigCommerce Settings V3 — Storefront Security
  description: 'BigCommerce Settings V3 — Storefront Security. 2 operations. Lead operation: BigCommerce Get Storefront Security
    Settings. Self-contained Naftiko capability covering one Bigcommerce business surface.'
  tags:
  - Bigcommerce
  - Storefront Security
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BIGCOMMERCE_API_KEY: BIGCOMMERCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: settings-storefront-security
    baseUri: https://api.bigcommerce.com/stores/{store_hash}/v3
    description: BigCommerce Settings V3 — Storefront Security business capability. Self-contained, no shared references.
    resources:
    - name: settings-storefront-security
      path: /settings/storefront/security
      operations:
      - name: getsettingsstorefrontsecurity
        method: GET
        description: BigCommerce Get Storefront Security Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesettingsstorefrontsecurity
        method: PUT
        description: BigCommerce Update Storefront Security Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.BIGCOMMERCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: settings-storefront-security-rest
    port: 8080
    description: REST adapter for BigCommerce Settings V3 — Storefront Security. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/settings/storefront/security
      name: settings-storefront-security
      description: REST surface for settings-storefront-security.
      operations:
      - method: GET
        name: getsettingsstorefrontsecurity
        description: BigCommerce Get Storefront Security Settings
        call: settings-storefront-security.getsettingsstorefrontsecurity
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesettingsstorefrontsecurity
        description: BigCommerce Update Storefront Security Settings
        call: settings-storefront-security.updatesettingsstorefrontsecurity
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: settings-storefront-security-mcp
    port: 9090
    transport: http
    description: MCP adapter for BigCommerce Settings V3 — Storefront Security. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: bigcommerce-get-storefront-security-settings
      description: BigCommerce Get Storefront Security Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: settings-storefront-security.getsettingsstorefrontsecurity
      outputParameters:
      - type: object
        mapping: $.
    - name: bigcommerce-update-storefront-security-settings
      description: BigCommerce Update Storefront Security Settings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: settings-storefront-security.updatesettingsstorefrontsecurity
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
