      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: channels-channels.createchannel
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: bigcommerce-get-channel
      description: BigCommerce Get a Channel
      hints:
        readOnly: true
