naftiko: 1.0.0-alpha2
info:
  label: BigCommerce Settings V3 — Email Statuses
  description: 'BigCommerce Settings V3 — Email Statuses. 2 operations. Lead operation: BigCommerce Get Transactional Email
    Settings. Self-contained Naftiko capability covering one Bigcommerce business surface.'
  tags:
  - Bigcommerce
  - Email Statuses
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BIGCOMMERCE_API_KEY: BIGCOMMERCE_API_KEY
capability:
  consumes:
  - type: http
    namespace: settings-email-statuses
    baseUri: https://api.bigcommerce.com/stores/{store_hash}/v3
    description: BigCommerce Settings V3 — Email Statuses business capability. Self-contained, no shared references.
    resources:
    - name: settings-email-statuses
      path: /settings/email-statuses
      operations:
      - name: getsettingsemailstatuses
        method: GET
        description: BigCommerce Get Transactional Email Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesettingsemailstatuses
        method: PUT
        description: BigCommerce Update Transactional Email Settings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: X-Auth-Token
      value: '{{env.BIGCOMMERCE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: settings-email-statuses-rest
    port: 8080
    description: REST adapter for BigCommerce Settings V3 — Email Statuses. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/settings/email-statuses
      name: settings-email-statuses
      description: REST surface for settings-email-statuses.
      operations:
      - method: GET
        name: getsettingsemailstatuses
        description: BigCommerce Get Transactional Email Settings
        call: settings-email-statuses.getsettingsemailstatuses
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesettingsemailstatuses
        description: BigCommerce Update Transactional Email Settings
        call: settings-email-statuses.updatesettingsemailstatuses
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: settings-email-statuses-mcp
    port: 9090
    transport: http
    description: MCP adapter for BigCommerce Settings V3 — Email Statuses. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: bigcommerce-get-transactional-email-settings
      description: BigCommerce Get Transactional Email Settings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: settings-email-statuses.getsettingsemailstatuses
      outputParameters:
      - type: object
        mapping: $.
    - name: bigcommerce-update-transactional-email-settings
      description: BigCommerce Update Transactional Email Settings
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: settings-email-statuses.updatesettingsemailstatuses
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
