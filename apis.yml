  - url: https://developer.bigcommerce.com/docs/rest-management/promotions
    type: Documentation
  description: >-
    BigCommerce Promotions API allows merchants to create, manage, and delete promotional
    campaigns and discount codes for their online store. A promotion is composed
    of a condition that a customer can satisfy, such as increasing their cart value
    above a certain amount or adding an item to their cart, after which an action
    takes place, such as a free item being added or a discount applying to the order
    total.
- aid: bigcommerce:bigcommerce-promotion-settings
  name: Big Commerce Promotion Settings
  tags:
  - Promotions
  - Settings
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.example.com
  humanURL: https://developer.bigcommerce.com/docs/rest-management/promotion-settings
  properties:
  - url: https://developer.bigcommerce.com/docs/rest-management/promotion-settings
    type: Documentation
  description: BigCommerce Promotion Settings API enables merchants to configure and manage global promotion settings for their online store. This API provides control over how promotions are applied and displayed, allowing businesses to customize the promotional experience and manage rules governing how different promotions interact with each other across the storefront.
- aid: bigcommerce:bigcommerce-pickup-methods
  name: Big Commerce Pickup Methods
  tags:
  - Fulfillment
  - Pickup
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.example.com
  humanURL: https://developer.bigcommerce.com/docs/rest-management/pickup-methods
  properties:
  - url: https://developer.bigcommerce.com/docs/rest-management/pickup-methods
    type: Documentation
  description: BigCommerce Pickup Methods API allows merchants to manage pickup methods for their buy online, pick up in store (BOPIS) fulfillment strategy. This REST Management API enables the creation and configuration of pickup methods that can be associated with store locations, giving customers the option to collect their orders from physical store locations rather than having them shipped.
- aid: bigcommerce:bigcommerce-storefront-pickup-options
  name: Big Commerce Storefront Pickup Options
  tags:
  - Fulfillment
  - Pickup
  - Storefronts
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  baseURL: https://api.example.com
  humanURL: https://developer.bigcommerce.com/docs/rest-storefront/pickup-options
  properties:
  - url: https://developer.bigcommerce.com/docs/rest-storefront/pickup-options
    type: Documentation
  description: BigCommerce Storefront Pickup Options API returns up to 10 available pickup options for requested items around a radius of provided search coordinates. The pickup options returned only include options where all requested items are available and can be picked up from a single location. This REST Storefront API endpoint enables shoppers to search for available pickup options near their location during the checkout process.
