  description: BigCommerce Transactions API provides access to order transaction data and payment actions. The API returns transaction details for orders, including payment method information and fraud details when available from the payment gateway. It also includes endpoints for payment actions such as refunds and void operations, enabling merchants to manage the complete payment lifecycle for their orders.
